# ═══════════════════════════════════════════════════════════════
#  GitHub Pages Deployment — Portfolio
#  Triggers on every push to `main`. Builds the Vite app and
#  deploys the dist/ folder via the official GitHub Pages action.
#  Requires Pages source set to "GitHub Actions" in repo settings.
# ═══════════════════════════════════════════════════════════════

name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one concurrent deployment
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── a) Checkout code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── b) Setup Node.js ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── c) Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: cd frontend && npm install

      # ── d) Build ─────────────────────────────────────────────
      - name: Build production bundle
        run: cd frontend && npm run build

      # ── e) Upload Pages artifact ──────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      # ── f) Deploy to GitHub Pages ─────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4